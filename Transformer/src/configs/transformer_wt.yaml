output_dir: outputs/basenji2_wt
log_dir: logs

data:
  manifest: data/manifest.yaml
  input_window_length: 196608

augmentation:
  rc_prob: 0.5
  shift_max: 1024

model:
  # Conv trunk
  stem_channels: 768
  stem_kernel_size: 15
  tower_filter_list: [768, 768, 896, 1024, 1152, 1280, 1536]
  bn_momentum: 0.1        # TF bn_momentum=0.9 → PyTorch momentum=1-0.9=0.1
  # Transformer tower
  d_model: 576
  n_heads: 8
  dim_key: 64
  n_layers: 4
  dropout: 0.4
  attn_dropout: 0.05
  pos_dropout: 0.01
  # Final pointwise
  pointwise_channels: 1024
  final_dropout: 0.1
  # Sequence geometry
  crop_size: 320          # bins cropped from each side before prediction head
  n_output_bins: 4        # RT classes (ES, MS, LS, NR)

loss:
  lambda_phase: 1.0
  # class_weights: [1.43, 1.43, 1.43, 1.0]  # ES, MS, LS, NR 等权重（强制平等对待四类）

training:
  learning_rate: 0.0001
  warmup_steps: 2000
  batch_size: 1
  gradient_accumulation_steps: 32
  max_epochs: 200
  early_stopping_patience: 10
  gradient_clip_norm: 0.2
  mixed_precision: true
  seed: 42
