output_dir: outputs/basenji2_wt
log_dir: logs

data:
  manifest: data/manifest.yaml
  input_window_length: 196608

augmentation:
  rc_prob: 0.5
  shift_max: 1024

model:
  bn_momentum: 0.1  # TF bn_momentum=0.9 → PyTorch momentum=1-0.9=0.1

loss:
  lambda_phase: 1.0
  class_weights: [1.43, 1.43, 1.43, 1.0]  # ES, MS, LS, NR 等权重（强制平等对待四类）

training:
  learning_rate: 0.0001
  warmup_steps: 2000
  batch_size: 4
  gradient_accumulation_steps: 8
  max_epochs: 200
  early_stopping_patience: 10
  gradient_clip_norm: 0.2
  mixed_precision: true
  seed: 42
